<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>🗺️ Story Map — Uppt&auml;cka</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
:root{
  --blue:#0058a3;--blue-light:#e3f2fd;--yellow:#ffdb00;
  --green:#00854a;--orange:#F26522;--red:#c62828;
  --bg:#f0f2f5;--white:#fff;--text:#1a1a1a;--muted:#666;--border:#dde3ec;
  --r1:#0058a3;--r2:#00854a;--r3:#F26522;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ── HEADER ── */
header{background:var(--blue);color:#fff;padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:100;}
header h1{font-size:16px;font-weight:700;flex:1;}
header .meta{font-size:11px;opacity:.7;}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;}
.hdr-btn:hover{background:rgba(255,255,255,.25);}
.hdr-btn.active{background:var(--yellow);color:#003f7a;border-color:var(--yellow);}
.save-dot{width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block;margin-right:4px;}

/* ── CONTEXT PANEL ── */
#ctx-panel{background:var(--white);border-bottom:2px solid var(--yellow);padding:12px 20px;flex-shrink:0;display:none;}
#ctx-panel.open{display:block;}
#ctx-panel .ctx-row{display:flex;gap:12px;}
#ctx-panel textarea{flex:1;border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:13px;font-family:inherit;resize:none;height:60px;}
.ctx-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--blue);margin-bottom:4px;}

/* ── MAIN LAYOUT ── */
#main{display:flex;flex:1;overflow:hidden;}

/* ── BOARD ── */
#board-wrap{flex:1;overflow-x:auto;overflow-y:auto;padding:16px;}
#board{display:flex;gap:0;min-height:100%;align-items:flex-start;}

/* ── ACTIVITY COLUMN ── */
.activity-col{flex-shrink:0;width:220px;background:transparent;margin-right:8px;}
.activity-header{background:var(--blue);color:#fff;border-radius:8px 8px 0 0;padding:10px 12px;cursor:grab;position:relative;}
.activity-header h3{font-size:13px;font-weight:700;margin-bottom:2px;line-height:1.3;}
.activity-header .act-meta{font-size:10px;opacity:.7;}
.act-actions{position:absolute;top:6px;right:6px;display:none;gap:4px;}
.activity-header:hover .act-actions{display:flex;}
.act-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:20px;height:20px;border-radius:4px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;}
.act-btn:hover{background:rgba(255,255,255,.4);}

/* ── TASKS ROW ── */
.tasks-row{background:var(--blue-light);border-left:2px solid var(--blue);border-right:2px solid var(--blue);padding:6px 6px 0;}
.task-card{background:var(--white);border:1px solid #b3cde8;border-top:3px solid var(--blue);border-radius:6px;padding:7px 9px;margin-bottom:6px;cursor:grab;position:relative;font-size:12px;font-weight:600;color:var(--blue);}
.task-card:hover .task-actions{display:flex;}
.task-actions{position:absolute;top:4px;right:4px;display:none;gap:3px;}
.t-btn{background:var(--blue-light);border:none;color:var(--blue);width:18px;height:18px;border-radius:3px;cursor:pointer;font-size:10px;}

/* ── STORIES AREA ── */
.stories-area{background:rgba(255,255,255,.5);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:6px;min-height:80px;}
.release-band{margin-bottom:4px;}
.release-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:2px 6px;border-radius:3px;margin-bottom:4px;display:inline-block;}
.release-label.r1{background:var(--r1);color:#fff;}
.release-label.r2{background:var(--r2);color:#fff;}
.release-label.r3{background:var(--r3);color:#fff;}
.story-drop-zone{min-height:32px;border:1px dashed var(--border);border-radius:6px;padding:3px;}
.story-card{background:var(--white);border-radius:6px;padding:7px 9px 7px 11px;margin-bottom:4px;font-size:11px;cursor:grab;position:relative;border:1px solid var(--border);line-height:1.4;}
.story-card.r1{border-left:3px solid var(--r1);}
.story-card.r2{border-left:3px solid var(--r2);}
.story-card.r3{border-left:3px solid var(--r3);}
.story-card:hover .s-actions{display:flex;}
.s-actions{position:absolute;top:3px;right:3px;display:none;gap:2px;}
.s-btn{background:var(--bg);border:none;color:var(--muted);width:16px;height:16px;border-radius:2px;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;}
.r-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;cursor:pointer;margin-right:4px;vertical-align:middle;}
.r-badge.r1{background:var(--blue-light);color:var(--r1);}
.r-badge.r2{background:#e8f5e9;color:var(--r2);}
.r-badge.r3{background:#fff3e0;color:var(--r3);}

/* ── ADD BUTTONS ── */
.add-story-btn{width:100%;border:1px dashed #aac4e0;background:transparent;color:#7aa7c7;padding:5px;border-radius:5px;cursor:pointer;font-size:11px;margin-top:2px;}
.add-story-btn:hover{background:var(--blue-light);color:var(--blue);border-color:var(--blue);}
.add-task-btn{width:100%;border:1px dashed rgba(0,88,163,.3);background:transparent;color:rgba(0,88,163,.5);padding:4px;border-radius:5px;cursor:pointer;font-size:11px;margin-bottom:4px;}
.add-task-btn:hover{background:var(--blue-light);color:var(--blue);}
.add-activity-col{width:180px;flex-shrink:0;}
.add-activity-btn{width:100%;height:60px;border:2px dashed var(--border);background:transparent;color:var(--muted);border-radius:8px;cursor:pointer;font-size:13px;}
.add-activity-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--white);}

/* ── AGENT SIDEBAR ── */
#agent{width:340px;flex-shrink:0;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#agent.collapsed{width:0;border:none;}
.agent-header{background:#1a2e4a;color:#fff;padding:12px 16px;font-size:13px;font-weight:700;flex-shrink:0;display:flex;align-items:center;gap:8px;}
.agent-header span{flex:1;}
.agent-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.agent-tab{flex:1;padding:8px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;}
.agent-tab.active{color:var(--blue);border-bottom-color:var(--blue);}
#analysis-panel{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
#chat-panel{flex:1;overflow:hidden;display:none;flex-direction:column;}
#chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.msg{padding:8px 11px;border-radius:8px;font-size:12px;line-height:1.5;max-width:90%;}
.msg.user{background:var(--blue);color:#fff;align-self:flex-end;border-radius:8px 8px 2px 8px;}
.msg.agent{background:#f0f4fa;color:var(--text);align-self:flex-start;border-radius:8px 8px 8px 2px;}
.msg.agent ul{padding-left:16px;margin-top:4px;}
.msg.agent li{margin-bottom:3px;}
.chat-input-row{padding:10px 12px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;}
.chat-input-row input{flex:1;border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;font-family:inherit;}
.chat-input-row input:focus{outline:none;border-color:var(--blue);}
.chat-send-btn{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:600;}

/* ── ANALYSIS CARDS ── */
.a-card{background:var(--bg);border-radius:8px;padding:11px 13px;font-size:12px;}
.a-card h4{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;}
.a-card ul{padding-left:14px;color:#333;}
.a-card ul li{margin-bottom:4px;}
.a-stat{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);}
.a-stat:last-child{border:none;}
.a-stat .val{font-weight:700;color:var(--blue);}
.suggestion-card{background:#fffde7;border:1px solid #ffe082;border-radius:8px;padding:10px 12px;font-size:12px;cursor:pointer;}
.suggestion-card:hover{background:#fff9c4;}
.suggestion-card .s-title{font-weight:600;color:#333;margin-bottom:3px;}
.suggestion-card .s-source{font-size:10px;color:var(--muted);}
.add-sug-btn{float:right;background:var(--blue);color:#fff;border:none;border-radius:4px;padding:2px 7px;font-size:10px;cursor:pointer;margin-top:-2px;}
.gap-item{padding:4px 0;border-bottom:1px solid var(--border);font-size:12px;color:#c62828;}
.gap-item:last-child{border:none;}

/* ── MODALS ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--white);border-radius:12px;padding:24px;width:400px;max-width:95vw;}
.modal h3{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--blue);}
.modal input,.modal textarea,.modal select{width:100%;border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;font-family:inherit;margin-bottom:12px;}
.modal textarea{height:70px;resize:none;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;}
.btn-primary{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:600;}
.btn-cancel{background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:6px;padding:8px 14px;cursor:pointer;font-size:13px;}

.sortable-ghost{opacity:.3;}
.sortable-drag{opacity:.8;}
/* ── CLUSTER BADGES ── */
.cluster-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:8px;margin-left:6px;vertical-align:middle;}
.cl0{background:#bbdefb;color:#0d47a1;}.cl1{background:#c8e6c9;color:#1b5e20;}.cl2{background:#ffe0b2;color:#bf360c;}.cl3{background:#e1bee7;color:#4a148c;}.cl4{background:#fce4ec;color:#880e4f;}
/* ── AI SUGGESTIONS ── */
.ai-sug-card{background:#f3f0ff;border:1px solid #c5b8f8;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;}
.ai-sug-title{font-weight:600;color:#4527a0;margin-bottom:3px;}
.ai-sug-meta{font-size:10px;color:var(--muted);margin-bottom:4px;}
.ai-sug-why{font-size:11px;color:#555;font-style:italic;margin-bottom:6px;}
.ai-btn-row{display:flex;gap:6px;}
.ai-accept{background:#4527a0;color:#fff;border:none;border-radius:4px;padding:3px 10px;font-size:11px;font-weight:600;cursor:pointer;}
.ai-accept:hover{background:#6a3de8;}
.ai-dismiss{background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;}
/* ── BULK ADD ── */
.bulk-area{display:none;padding:4px 0;}
.bulk-area.open{display:block;}
.bulk-ta{width:100%;border:1px solid var(--border);border-radius:5px;padding:6px 8px;font-size:11px;font-family:inherit;resize:none;height:68px;margin-bottom:4px;}
.bulk-ta:focus{outline:none;border-color:var(--blue);}
.bulk-row{display:flex;gap:4px;}
.bulk-ok{background:var(--blue);color:#fff;border:none;border-radius:4px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;}
.bulk-cancel{background:var(--bg);color:var(--muted);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:11px;cursor:pointer;}
.add-story-btn-row{display:flex;gap:4px;margin-top:4px;}
.add-story-btn{flex:1;border:2px dashed #0058a3;background:var(--blue-light);color:var(--blue);padding:6px;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;}
.add-story-btn:hover{background:var(--blue);color:#fff;}
.bulk-btn{background:var(--bg);border:1px dashed var(--border);color:var(--muted);padding:6px 8px;border-radius:5px;cursor:pointer;font-size:11px;}
.bulk-btn:hover{border-color:var(--blue);color:var(--blue);}
/* ── TOKEN MODAL ── */
.token-note{font-size:11px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <h1>🗺️ Story Map</h1>
  <span class="meta" id="map-stats"></span>
  <button class="hdr-btn" onclick="toggleCtx()">📋 Context</button>
  <button class="hdr-btn" onclick="toggleRelease(1)" id="rbtn1">R1</button>
  <button class="hdr-btn" onclick="toggleRelease(2)" id="rbtn2">R2</button>
  <button class="hdr-btn" onclick="toggleRelease(3)" id="rbtn3">R3</button>
  <button class="hdr-btn" onclick="exportJSON()">⬇ Export</button>
  <button class="hdr-btn" onclick="clearMap()" title="Reset map">↺ Reset</button>
  <button class="hdr-btn" onclick="clusterActivities()" title="Group similar activities by Patton principles">🔗 Cluster</button>
  <button class="hdr-btn" style="background:#4527a0;border-color:#6a3de8;" onclick="aiReview()">🤖 AI Review</button>
  <span><span class="save-dot" id="savedot"></span><span style="font-size:11px;opacity:.7" id="savelabel">Saved</span></span>
</header>

<!-- CONTEXT PANEL -->
<div id="ctx-panel">
  <div class="ctx-label">Problem Statement &amp; Context (read by the agent)</div>
  <div class="ctx-row">
    <textarea id="ctx-text" placeholder="Describe the product, user, and problem you are mapping..." oninput="saveState()"></textarea>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <!-- BOARD -->
  <div id="board-wrap">
    <div id="board"></div>
  </div>

  <!-- AGENT -->
  <div id="agent">
    <div class="agent-header">🤖 <span>Uppa — Story Agent</span></div>
    <div class="agent-tabs">
      <div class="agent-tab active" onclick="switchTab('analysis')">💡 Analysis</div>
      <div class="agent-tab" onclick="switchTab('chat')">💬 Chat</div>
    </div>
    <div id="analysis-panel"></div>
    <div id="chat-panel">
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Ask about the map or product…" onkeydown="if(event.key==='Enter')sendChat()"/>
        <button class="chat-send-btn" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- TOKEN MODAL -->
<div class="modal-bg" id="token-modal">
  <div class="modal">
    <h3>🔑 GitHub Copilot Token</h3>
    <p class="token-note">AI Review calls the Copilot API — same token as Product Discovery v2.<br/>Get it: <strong>Product Discovery v2 → ⚙ Settings → copy token</strong></p>
    <input id="token-input" type="password" placeholder="ghp_… or gho_…"/>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="document.getElementById('token-modal').classList.remove('open')">Cancel</button>
      <button class="btn-primary" onclick="saveToken()">Save &amp; Run Review</button>
    </div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <h3 id="modal-title">Edit</h3>
    <input id="modal-input" type="text" placeholder="Title…"/>
    <textarea id="modal-body" placeholder="Description (optional)…"></textarea>
    <div id="modal-release-row" style="display:none">
      <label style="font-size:12px;font-weight:600;color:var(--muted)">Release:</label>
      <select id="modal-release">
        <option value="1">R1 — MVP</option>
        <option value="2">R2</option>
        <option value="3">R3</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="modal-save">Save</button>
    </div>
  </div>
</div>

<script>
// ── KNOWLEDGE ─────────────────────────────────────────────
let QA = [], HANDBOOK = [], FEATURES = [];
fetch('knowledge.json').then(r=>r.json()).then(d=>{
  QA = d.qa || [];
  HANDBOOK = d.handbook || [];
  FEATURES = d.features || [];
  renderAnalysis();
});

// ── UPPA NLP ENGINE (reused) ──────────────────────────────
const STOP = new Set(['the','a','an','is','are','was','were','be','been','being','have','has','had',
  'do','does','did','will','would','could','should','may','might','can','shall','to','of','in',
  'on','at','by','for','with','about','as','from','into','through','or','and','but','not','no',
  'i','you','we','they','it','this','that','what','how','when','where','which','who']);

function stem(w){
  return w.replace(/ners?$/,'n').replace(/nings?$/,'').replace(/tions?$/,'')
    .replace(/ings?$/,'').replace(/ers?$/,'').replace(/ness$/,'')
    .replace(/ed$/,'').replace(/ly$/,'').replace(/es$/,'').replace(/s$/,'');
}
const SYNONYMS={
  search:['find','look','browse','discover','locate','explore'],
  delivery:['deliver','ship','order','home','purchase','buy'],
  list:['cart','basket','save','wishlist'],
  price:['cost','ptag','tag','amount'],
  scan:['barcode','qr','scan','camera'],
  help:['assist','support','coworker','staff','employee'],
  offer:['deal','discount','sale','promotion'],
  planner:['plan','planning','design','designer','configure'],
};
function expandWord(w){
  const base=stem(w), result=new Set([w,base]);
  Object.entries(SYNONYMS).forEach(([key,syns])=>{
    if(key===w||key===base||syns.includes(w)||syns.includes(base)){result.add(key);syns.forEach(s=>result.add(s));}
  });
  return result;
}
function searchKnowledge(query, topN=5){
  const q=query.toLowerCase().replace(/[?!.,]/g,'');
  const qWords=q.split(/\s+/);
  const qM=qWords.filter(w=>w.length>=3&&!STOP.has(w));
  const score=(text,title='')=>{
    let s=0;
    const tl=title.toLowerCase(), bl=text.toLowerCase();
    qM.forEach(w=>{
      const exp=expandWord(w);
      if(tl.includes(w))s+=8; else if([...exp].some(e=>tl.includes(e)))s+=5;
      if(bl.includes(w))s+=3; else if([...exp].some(e=>bl.includes(e)))s+=2;
    });
    return s;
  };
  const results=[];
  QA.forEach(item=>{
    const s=score(item.a||'',item.q||'');
    if(s>=4) results.push({title:item.q,body:item.a,source:'FAQ',score:s});
  });
  FEATURES.forEach(item=>{
    const s=score(item.body||'',item.title||'');
    if(s>=4) results.push({title:item.title,body:item.body,source:'Jira',score:s});
  });
  HANDBOOK.forEach(item=>{
    const s=score(item.body||'',item.title||'');
    if(s>=6) results.push({title:item.title,body:item.body,source:'Handbook',score:s});
  });
  results.sort((a,b)=>b.score-a.score);
  return results.slice(0,topN);
}

// ── STATE ─────────────────────────────────────────────────
const DEFAULT_STATE = {
  context: "Uppt\u00e4cka is IKEA\u2019s in-store digital kiosk. Customers use it to find products, check prices, start shopping lists, order delivery services, and get help. The kiosk runs in IKEA stores globally.",
  activities: [
    { id:'a1', title:'Discover Products', tasks:[
      { id:'t1', title:'Search by keyword', stories:[] },
      { id:'t2', title:'Browse by category', stories:[] },
      { id:'t3', title:'Scan item barcode', stories:[] }
    ]},
    { id:'a2', title:'Build a List', tasks:[
      { id:'t4', title:'Add items to list', stories:[] },
      { id:'t5', title:'View & edit list', stories:[] }
    ]},
    { id:'a3', title:'Get Prices & Info', tasks:[
      { id:'t6', title:'Check PTAG price', stories:[] },
      { id:'t7', title:'View product details', stories:[] }
    ]},
    { id:'a4', title:'Order & Checkout', tasks:[
      { id:'t8', title:'Start delivery order', stories:[] },
      { id:'t9', title:'Complete order', stories:[] }
    ]},
    { id:'a5', title:'Get Help', tasks:[
      { id:'t10', title:'Use Uppa chatbot', stories:[] },
      { id:'t11', title:'Handover to S\u00e4lja', stories:[] }
    ]}
  ],
  releases:['R1 \u2014 MVP','R2','R3'],
  visibleReleases:[1,2,3]
};

let STATE = JSON.parse(JSON.stringify(DEFAULT_STATE));
let idCounter = 100;
const uid = () => 'id' + (++idCounter);

// ── LOAD / SAVE ───────────────────────────────────────────
function loadState(){
  try{
    const saved = localStorage.getItem('uppa_storymap');
    if(saved){ STATE = JSON.parse(saved); idCounter = 200; }
  }catch(e){}
}
function saveState(){
  if(document.getElementById('ctx-text'))
    STATE.context = document.getElementById('ctx-text').value;
  localStorage.setItem('uppa_storymap', JSON.stringify(STATE));
  const dot = document.getElementById('savedot');
  const lbl = document.getElementById('savelabel');
  if(dot){ dot.style.background='#4caf50'; lbl.textContent='Saved'; }
  updateStats();
  renderAnalysis();
}
function updateStats(){
  let tasks=0,stories=0;
  STATE.activities.forEach(a=>{a.tasks.forEach(t=>{tasks++;stories+=t.stories.length;})});
  const el=document.getElementById('map-stats');
  if(el) el.textContent = STATE.activities.length+' activities · '+tasks+' tasks · '+stories+' stories';
}

// ── RELEASE FILTER ────────────────────────────────────────
function toggleRelease(r){
  const idx = STATE.visibleReleases.indexOf(r);
  if(idx>=0) STATE.visibleReleases.splice(idx,1);
  else STATE.visibleReleases.push(r);
  ['rbtn1','rbtn2','rbtn3'].forEach((id,i)=>{
    const btn=document.getElementById(id);
    if(btn) btn.classList.toggle('active', STATE.visibleReleases.includes(i+1));
  });
  renderBoard();
  saveState();
}

// ── RENDER BOARD ──────────────────────────────────────────
function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';

  STATE.activities.forEach(act => {
    const col = document.createElement('div');
    col.className = 'activity-col';
    col.dataset.actId = act.id;

    col.innerHTML = `
      <div class="activity-header" ondblclick="editActivity('${act.id}')">
        <h3>${esc(act.title)}${(STATE.clusters&&STATE.clusters[act.id]!==undefined)?`<span class="cluster-badge cl${STATE.clusters[act.id]%5}">C${STATE.clusters[act.id]+1}</span>`:''}</h3>
        <div class="act-meta">${act.tasks.length} tasks</div>
        <div class="act-actions">
          <button class="act-btn" onclick="editActivity('${act.id}')" title="Edit">✏️</button>
          <button class="act-btn" onclick="deleteActivity('${act.id}')" title="Delete">🗑</button>
        </div>
      </div>
      <div class="tasks-row" id="tasks-${act.id}">
        ${act.tasks.map(t => renderTask(t, act.id)).join('')}
        <button class="add-task-btn" onclick="addTask('${act.id}')">+ Task</button>
      </div>`;

    board.appendChild(col);
    initActivitySortable(act.id);
  });

  // Add activity button
  const addCol = document.createElement('div');
  addCol.className = 'add-activity-col';
  addCol.innerHTML = `<button class="add-activity-btn" onclick="addActivity()">＋<br/>Activity</button>`;
  board.appendChild(addCol);

  // Activities drag
  Sortable.create(board, {
    animation:150, handle:'.activity-header', ghostClass:'sortable-ghost',
    filter:'.add-activity-col',
    onEnd: e => {
      const moved = STATE.activities.splice(e.oldIndex,1)[0];
      STATE.activities.splice(e.newIndex,0,moved);
      saveState(); renderBoard();
    }
  });

  updateStats();
}

function renderTask(t, actId){
  const stories = t.stories.filter(s => STATE.visibleReleases.includes(parseInt(s.release)||1));
  return `
    <div class="task-card" id="task-${t.id}" data-task-id="${t.id}" data-act-id="${actId}" ondblclick="editTask('${t.id}','${actId}')">
      ${esc(t.title)}
      <div class="task-actions">
        <button class="t-btn" onclick="editTask('${t.id}','${actId}')">✏</button>
        <button class="t-btn" onclick="suggestForTask('${t.id}')">💡</button>
        <button class="t-btn" onclick="deleteTask('${t.id}','${actId}')">✕</button>
      </div>
    </div>
    <div class="stories-area" id="stories-${t.id}">
      ${[1,2,3].filter(r=>STATE.visibleReleases.includes(r)).map(r=>{
        const rs = t.stories.filter(s=>(parseInt(s.release)||1)===r);
        return rs.length>0 ? `
          <div class="release-band">
            <div class="release-label r${r}">${STATE.releases[r-1]}</div>
            <div class="story-drop-zone" id="drop-${t.id}-r${r}" data-task="${t.id}" data-rel="${r}">
              ${rs.map(s=>renderStory(s)).join('')}
            </div>
          </div>` : `<div class="story-drop-zone" id="drop-${t.id}-r${r}" data-task="${t.id}" data-rel="${r}" style="min-height:4px;border:none;"></div>`;
      }).join('')}
      <div class="add-story-btn-row">
        <button class="add-story-btn" onclick="addStory('${t.id}')">＋ Story</button>
        <button class="bulk-btn" onclick="toggleBulk('${t.id}')" title="Type multiple stories at once">📝 Bulk</button>
      </div>
      <div class="bulk-area" id="bulk-${t.id}">
        <textarea class="bulk-ta" id="bulk-ta-${t.id}" placeholder="One story per line…&#10;View product price&#10;Show stock availability&#10;Display delivery options"></textarea>
        <div class="bulk-row">
          <button class="bulk-ok" onclick="bulkAddStories('${t.id}')">✓ Add All</button>
          <button class="bulk-cancel" onclick="toggleBulk('${t.id}')">Cancel</button>
        </div>
      </div>
    </div>`;
}

function renderStory(s){
  return `<div class="story-card r${s.release||1}" id="story-${s.id}" data-story-id="${s.id}">
    <span class="r-badge r${s.release||1}" onclick="cycleRelease('${s.id}')" title="Click to change release">R${s.release||1}</span>${esc(s.text)}
    <div class="s-actions">
      <button class="s-btn" onclick="editStory('${s.id}')">✏</button>
      <button class="s-btn" onclick="deleteStory('${s.id}')">✕</button>
    </div>
  </div>`;
}

function initActivitySortable(actId){
  const tasksRow = document.getElementById('tasks-'+actId);
  if(!tasksRow) return;
  Sortable.create(tasksRow, {
    animation:100, ghostClass:'sortable-ghost',
    filter:'.add-task-btn', group:'tasks',
    onEnd: e => {
      const taskId = e.item.dataset.taskId;
      const srcActId = e.from.closest('.activity-col').dataset.actId;
      const dstActId = e.to.closest('.activity-col').dataset.actId;
      const srcAct = STATE.activities.find(a=>a.id===srcActId);
      const dstAct = STATE.activities.find(a=>a.id===dstActId);
      if(!srcAct||!dstAct) return;
      const tIdx = srcAct.tasks.findIndex(t=>t.id===taskId);
      if(tIdx<0) return;
      const [task] = srcAct.tasks.splice(tIdx,1);
      dstAct.tasks.splice(e.newIndex,0,task);
      saveState(); renderBoard();
    }
  });

  const act = STATE.activities.find(a=>a.id===actId);
  if(!act) return;
  act.tasks.forEach(t => {
    [1,2,3].forEach(r => {
      const zone = document.getElementById(`drop-${t.id}-r${r}`);
      if(!zone) return;
      Sortable.create(zone, {
        animation:100, ghostClass:'sortable-ghost', group:'stories',
        onEnd: e => {
          const sid = e.item.dataset.storyId;
          const dstZone = e.to;
          const dstTaskId = dstZone.dataset.task;
          const dstRel = parseInt(dstZone.dataset.rel)||1;
          // Remove from source
          STATE.activities.forEach(a=>a.tasks.forEach(tk=>{
            const idx=tk.stories.findIndex(s=>s.id===sid);
            if(idx>=0) tk.stories.splice(idx,1);
          }));
          // Add to destination
          const dstTask = STATE.activities.flatMap(a=>a.tasks).find(tk=>tk.id===dstTaskId);
          if(dstTask){
            const story = {id:sid, text:e.item.textContent.trim().replace(/^R\d/,'').trim(), release:dstRel};
            dstTask.stories.splice(e.newIndex,0,story);
          }
          saveState(); renderBoard();
        }
      });
    });
  });
}

// ── MODAL HELPERS ─────────────────────────────────────────
let modalCb = null;
function openModal(title, val='', body='', showRelease=false, rel=1, cb){
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-input').value = val;
  document.getElementById('modal-body').value = body;
  document.getElementById('modal-release-row').style.display = showRelease?'block':'none';
  document.getElementById('modal-release').value = rel;
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(),50);
  modalCb = cb;
  document.getElementById('modal-save').onclick = ()=>{
    const v=document.getElementById('modal-input').value.trim();
    if(!v) return;
    const b=document.getElementById('modal-body').value.trim();
    const r=parseInt(document.getElementById('modal-release').value)||1;
    closeModal();
    if(modalCb) modalCb(v,b,r);
    modalCb=null;
  };
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

// ── CRUD ──────────────────────────────────────────────────
function addActivity(){
  openModal('New Activity','','',false,1,(title)=>{
    STATE.activities.push({id:uid(),title,tasks:[]});
    saveState(); renderBoard();
  });
}
function editActivity(id){
  const act=STATE.activities.find(a=>a.id===id);
  openModal('Edit Activity',act.title,'',false,1,(title)=>{act.title=title;saveState();renderBoard();});
}
function deleteActivity(id){
  if(!confirm('Delete this activity and all its tasks/stories?')) return;
  STATE.activities=STATE.activities.filter(a=>a.id!==id);
  saveState(); renderBoard();
}
function addTask(actId){
  openModal('New Task','','',false,1,(title)=>{
    const act=STATE.activities.find(a=>a.id===actId);
    if(act) act.tasks.push({id:uid(),title,stories:[]});
    saveState(); renderBoard();
  });
}
function editTask(taskId,actId){
  const act=STATE.activities.find(a=>a.id===actId);
  const task=act&&act.tasks.find(t=>t.id===taskId);
  if(!task) return;
  openModal('Edit Task',task.title,'',false,1,(title)=>{task.title=title;saveState();renderBoard();});
}
function deleteTask(taskId,actId){
  const act=STATE.activities.find(a=>a.id===actId);
  if(act) act.tasks=act.tasks.filter(t=>t.id!==taskId);
  saveState(); renderBoard();
}
function addStory(taskId, prefill='', rel=1){
  openModal('New Story',prefill,'',true,rel,(text,body,release)=>{
    const task=STATE.activities.flatMap(a=>a.tasks).find(t=>t.id===taskId);
    if(task) task.stories.push({id:uid(),text,release});
    saveState(); renderBoard();
  });
}
function editStory(sid){
  const story=STATE.activities.flatMap(a=>a.tasks).flatMap(t=>t.stories).find(s=>s.id===sid);
  if(!story) return;
  openModal('Edit Story',story.text,'',true,story.release||1,(text,body,release)=>{
    story.text=text; story.release=release; saveState(); renderBoard();
  });
}
function deleteStory(sid){
  STATE.activities.forEach(a=>a.tasks.forEach(t=>{t.stories=t.stories.filter(s=>s.id!==sid);}));
  saveState(); renderBoard();
}
function cycleRelease(sid){
  const story=STATE.activities.flatMap(a=>a.tasks).flatMap(t=>t.stories).find(s=>s.id===sid);
  if(!story) return;
  story.release = ((parseInt(story.release)||1) % 3) + 1;
  saveState(); renderBoard();
}
function clearMap(){
  if(!confirm('Reset map to default Uppt\u00e4cka template?')) return;
  localStorage.removeItem('uppa_storymap');
  STATE=JSON.parse(JSON.stringify(DEFAULT_STATE));
  document.getElementById('ctx-text').value=STATE.context;
  renderBoard(); renderAnalysis();
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(STATE,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='storymap.json'; a.click();
}
function toggleCtx(){
  document.getElementById('ctx-panel').classList.toggle('open');
}

// ── ANALYSIS PANEL ────────────────────────────────────────
function renderAnalysis(){
  const panel = document.getElementById('analysis-panel');
  if(!panel) return;
  const allTasks = STATE.activities.flatMap(a=>a.tasks);
  const allStories = allTasks.flatMap(t=>t.stories);
  const r1 = allStories.filter(s=>(parseInt(s.release)||1)===1).length;
  const r2 = allStories.filter(s=>parseInt(s.release)===2).length;
  const r3 = allStories.filter(s=>parseInt(s.release)===3).length;
  const emptyTasks = allTasks.filter(t=>t.stories.length===0);
  let html = '';

  // Map health
  html += `<div class="a-card"><h4>📊 Map Health</h4>
    <div class="a-stat"><span>Activities</span><span class="val">${STATE.activities.length}</span></div>
    <div class="a-stat"><span>Tasks</span><span class="val">${allTasks.length}</span></div>
    <div class="a-stat"><span>Stories total</span><span class="val">${allStories.length}</span></div>
    <div class="a-stat"><span>R1 — MVP</span><span class="val" style="color:var(--r1)">${r1}</span></div>
    <div class="a-stat"><span>R2</span><span class="val" style="color:var(--r2)">${r2}</span></div>
    <div class="a-stat"><span>R3</span><span class="val" style="color:var(--r3)">${r3}</span></div>
  </div>`;

  // Patton checks
  const issues = [];
  const actsWithR1 = STATE.activities.filter(a=>a.tasks.some(t=>t.stories.some(s=>(parseInt(s.release)||1)===1)));
  if(allStories.length>0 && actsWithR1.length>0 && actsWithR1.length < STATE.activities.length*0.6){
    const missing = STATE.activities.filter(a=>!actsWithR1.includes(a)).map(a=>a.title);
    issues.push(`<strong>Vertical slicing</strong> — ${missing.slice(0,3).join(', ')} have no R1 stories. Patton: slice horizontally — one thin story across every activity.`);
  }
  if(r1 > Math.max(allTasks.length*1.5, 10)){
    issues.push(`<strong>Overstuffed MVP</strong> — ${r1} stories in R1. Walking skeleton = ~1 per task. Move some to R2.`);
  }
  if(allStories.length>0 && r1===0){
    issues.push(`<strong>No walking skeleton</strong> — Tag your most essential stories R1 (click the badge) to define the thin end-to-end slice.`);
  }
  const emptyActs = STATE.activities.filter(a=>a.tasks.length===0);
  if(emptyActs.length) issues.push(`<strong>Empty backbone</strong> — ${emptyActs.map(a=>a.title).join(', ')} have no tasks (ribs missing).`);

  if(issues.length){
    html += `<div class="a-card" style="background:#fce4ec;border:1px solid #f48fb1"><h4>⚠️ Patton Check</h4>
      <ul style="padding-left:14px">${issues.map(i=>`<li style="margin-bottom:5px;font-size:12px">${i}</li>`).join('')}</ul></div>`;
  } else if(allStories.length>2){
    html += `<div class="a-card" style="background:#e8f5e9;border:1px solid #a5d6a7"><h4>✅ Patton Check Passed</h4>
      <p style="font-size:12px;color:#1b5e20">Horizontal slicing ✓ Walking skeleton ✓ Backbone covered ✓</p></div>`;
  }

  // Gaps
  if(emptyTasks.length){
    html += `<div class="a-card"><h4>⚠️ Tasks with no stories (${emptyTasks.length})</h4>
      ${emptyTasks.map(t=>`<div class="gap-item">📌 ${esc(t.title)}</div>`).join('')}</div>`;
    const results = searchKnowledge(emptyTasks[0].title, 3);
    if(results.length){
      html += `<div class="a-card"><h4>💡 Suggested for "${esc(emptyTasks[0].title)}"</h4>
        ${results.map(r=>`<div class="suggestion-card">
          <button class="add-sug-btn" onclick="addStory('${emptyTasks[0].id}','${esc(r.title)}')">+ Add</button>
          <div class="s-title">${esc(r.title.substring(0,60))}${r.title.length>60?'…':''}</div>
          <div class="s-source">📎 ${r.source}</div></div>`).join('')}</div>`;
    }
  }

  // AI suggestions
  const pending = (STATE.aiSuggestions||[]).filter(s=>!s.dismissed);
  if(pending.length){
    html += `<div class="a-card" style="background:#f3f0ff;border:1px solid #c5b8f8">
      <h4>🤖 AI Suggestions (${pending.length})</h4>
      ${pending.slice(0,6).map(s=>`<div class="ai-sug-card">
        <div class="ai-sug-title">${esc(s.suggestion)}</div>
        <div class="ai-sug-meta">${s.type==='missing-story'?'📝':'🏗️'} ${esc(s.targetActivity||'')}${s.targetTask?' → '+esc(s.targetTask):''}</div>
        <div class="ai-sug-why">${esc(s.rationale||'')}</div>
        <div class="ai-btn-row">
          <button class="ai-accept" onclick="acceptAISug(${(STATE.aiSuggestions||[]).indexOf(s)})">✓ Add</button>
          <button class="ai-dismiss" onclick="dismissAISug(${(STATE.aiSuggestions||[]).indexOf(s)})">✕</button>
        </div></div>`).join('')}
      ${pending.length>6?`<p style="font-size:11px;text-align:center;color:var(--muted)">${pending.length-6} more…</p>`:''}</div>`;
  }

  // Patton tip (rotates by hour)
  const tip = PATTON.facilitation[Math.floor(Date.now()/3600000) % PATTON.facilitation.length];
  html += `<div class="a-card" style="background:#fffde7;border:1px solid #ffe082">
    <h4>💡 Patton Tip</h4><p style="font-size:12px;color:#5d4037">${esc(tip)}</p></div>`;

  panel.innerHTML = html;
}

// ── AGENT CHAT ────────────────────────────────────────────
function switchTab(tab){
  document.querySelectorAll('.agent-tab').forEach((t,i)=>t.classList.toggle('active', (i===0&&tab==='analysis')||(i===1&&tab==='chat')));
  document.getElementById('analysis-panel').style.display = tab==='analysis'?'flex':'none';
  document.getElementById('chat-panel').style.display = tab==='chat'?'flex':'none';
}

function suggestForTask(taskId){
  const task = STATE.activities.flatMap(a=>a.tasks).find(t=>t.id===taskId);
  if(!task) return;
  switchTab('chat');
  sendAgentMessage(`Suggest stories for the task: "${task.title}"`);
}

function sendChat(){
  const input = document.getElementById('chat-input');
  const q = input.value.trim();
  if(!q) return;
  input.value='';
  sendAgentMessage(q);
}

function sendAgentMessage(q){
  addChatMsg('user', q);
  setTimeout(()=>addChatMsg('agent', agentRespond(q)), 300);
}

function agentRespond(q){
  const ql = q.toLowerCase();
  const allTasks = STATE.activities.flatMap(a=>a.tasks);
  const allStories = allTasks.flatMap(t=>t.stories);
  const ctx = STATE.context || '';

  // ── MAP ANALYSIS QUESTIONS ──
  if(ql.includes('gap') || ql.includes('missing') || ql.includes('empty')){
    const empty = allTasks.filter(t=>t.stories.length===0);
    if(empty.length===0) return '✅ No gaps found! All tasks have at least one story. The map looks well covered.';
    return `⚠️ Found <strong>${empty.length} task(s) with no stories:</strong><ul>${empty.map(t=>`<li><strong>${esc(t.title)}</strong></li>`).join('')}</ul>Click 💡 on any task card to get story suggestions from the product knowledge base.`;
  }
  if(ql.includes('mvp') || ql.includes('release 1') || ql.includes('r1')){
    const r1 = allStories.filter(s=>(parseInt(s.release)||1)===1);
    if(r1.length===0) return '⚠️ No stories are tagged R1 yet. To define your MVP, click the release badge on a story card to cycle it to R1. A good MVP covers one full user journey end-to-end — thinly, not deeply.';
    return `📦 <strong>R1 — MVP has ${r1.length} stories:</strong><ul>${r1.slice(0,8).map(s=>`<li>${esc(s.text.substring(0,50))}${s.text.length>50?'…':''}</li>`).join('')}</ul>${r1.length>8?`<em>…and ${r1.length-8} more.</em>`:''}`;
  }
  if(ql.includes('summary') || ql.includes('overview')){
    const r1=allStories.filter(s=>(parseInt(s.release)||1)===1).length;
    const r2=allStories.filter(s=>parseInt(s.release)===2).length;
    const r3=allStories.filter(s=>parseInt(s.release)===3).length;
    return `🗺️ <strong>Map Summary</strong><br/>${STATE.activities.length} activities, ${allTasks.length} tasks, ${allStories.length} stories.<br/>R1: ${r1} · R2: ${r2} · R3: ${r3}<br/><br/>Activities: ${STATE.activities.map(a=>a.title).join(' → ')}`;
  }
  if(ql.includes('invest') || ql.includes('good story') || ql.includes('well written')){
    return `📋 <strong>INVEST criteria for a good story:</strong><ul>
      <li><strong>I</strong>ndependent — can be developed alone</li>
      <li><strong>N</strong>egotiable — details can change</li>
      <li><strong>V</strong>aluable — delivers value to the user</li>
      <li><strong>E</strong>stimable — team can size it</li>
      <li><strong>S</strong>mall — fits in a sprint</li>
      <li><strong>T</strong>estable — can write acceptance criteria</li></ul>
      Format: <em>"As a [user], I want [goal] so that [reason]"</em>`;
  }
  if(ql.includes('suggest') || ql.includes('stories for')){
    const taskMatch = allTasks.find(t => ql.includes(t.title.toLowerCase()));
    const searchQ = taskMatch ? taskMatch.title : q.replace(/suggest.*for|stories for/gi,'').trim();
    const results = searchKnowledge(searchQ, 5);
    if(results.length===0) return `🔍 No matches found in the knowledge base for "<strong>${esc(searchQ)}</strong>". Try a more specific term.`;
    const taskForAdd = taskMatch || allTasks.find(t=>t.stories.length===0);
    return `💡 <strong>From knowledge base for "${esc(searchQ)}":</strong><ul>
      ${results.map(r=>`<li><strong>${esc(r.title.substring(0,55))}${r.title.length>55?'…':''}</strong> <em>(${r.source})</em></li>`).join('')}
      </ul>${taskForAdd?`Click 💡 on "<strong>${esc(taskForAdd.title)}</strong>" to add these directly to the board.`:''}`;
  }

  // ── PRODUCT KNOWLEDGE SEARCH ──
  const results = searchKnowledge(q, 4);
  if(results.length > 0){
    return `🔍 Found in product knowledge:<ul>${results.map(r=>`<li><strong>${esc(r.title.substring(0,60))}${r.title.length>60?'…':''}</strong> <em>(${r.source})</em></li>`).join('')}</ul>`;
  }

  // ── STORY MAPPING GUIDANCE ──
  if(ql.includes('backbone')||ql.includes('activities')){
    return `🦴 <strong>The Backbone (Jeff Patton)</strong><br/>
      The top row of activities tells the complete user story left-to-right — the narrative flow.<br/><br/>
      "${PATTON.principles[0]}"<br/><br/>
      Your current backbone: <em>${STATE.activities.map(a=>a.title).join(' → ') || '(no activities yet)'}</em>`;
  }
  if(ql.includes('skeleton')||ql.includes('walking')){
    return `🏗️ <strong>Walking Skeleton (Jeff Patton)</strong><br/>
      "${PATTON.principles[1]}"<br/><br/>
      Check: Does your R1 have at least 1 story from EVERY activity?<br/>
      <ul>${PATTON.mvpChecks.map(c=>`<li>${c}</li>`).join('')}</ul>`;
  }
  if(ql.includes('slice')||ql.includes('horizontal')||ql.includes('vertical')){
    return `✂️ <strong>Slicing (Jeff Patton)</strong><br/>
      "${PATTON.principles[2]}"<br/><br/>
      ❌ Anti-pattern: "${PATTON.antiPatterns[0]}"<br/>
      ✅ Correct: Add one story to EVERY activity before going deep on any one.`;
  }
  if(ql.includes('anti') || ql.includes('mistake') || ql.includes('wrong')){
    return `⚠️ <strong>Story Mapping Anti-Patterns (Jeff Patton)</strong><ul>
      ${PATTON.antiPatterns.map(a=>`<li>${a}</li>`).join('')}</ul>`;
  }
  if(ql.includes('facilit') || ql.includes('workshop') || ql.includes('run a')){
    return `🎯 <strong>Facilitation Tips (Jeff Patton)</strong><ul>
      ${PATTON.facilitation.map(f=>`<li>${f}</li>`).join('')}</ul>`;
  }
  if(ql.includes('how') || ql.includes('what is') || ql.includes('explain')){
    return `📖 <strong>Story Mapping (Jeff Patton)</strong><br/>
      1. <strong>Activities</strong> = big goals (top row, left→right = user journey)<br/>
      2. <strong>Tasks</strong> = steps to achieve each activity<br/>
      3. <strong>Stories</strong> = functionality under each task<br/>
      4. <strong>Releases</strong> = horizontal slices (R1=MVP, R2, R3)<br/><br/>
      Key insight: read across the top = full user journey. Read down = priority within each task.<br/>
      <em>"${PATTON.principles[3]}"</em>`;
  }

  return `🤔 I didn't find a specific match. Try asking:<br/>
    <ul>
      <li>"What are the gaps in this map?"</li>
      <li>"Suggest stories for [task name]"</li>
      <li>"What should be in the MVP?"</li>
      <li>"Explain the walking skeleton"</li>
      <li>"What are story mapping anti-patterns?"</li>
      <li>"Tell me about search" (product knowledge)</li>
    </ul>`;
}

function addChatMsg(role, html){
  const msgs = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

// ── UTILS ─────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── PATTON KNOWLEDGE ──────────────────────────────────────
const PATTON = {
  principles:[
    'The backbone (top row of activities) tells the full user story left-to-right — never prioritize one activity over another.',
    'Walking skeleton = the thinnest possible slice that spans ALL activities end-to-end.',
    'Slice horizontally across the whole map, never vertically into one activity.',
    'MVP = a complete working experience for one user in one context — not a set of features.',
    'Order activities in narrative order — the order you\'d explain the system to someone.',
    'Tasks are "ribs" hanging off activities — steps a user takes within that activity.',
    'Stories are written beneath tasks; they represent variations, edge cases, and quality improvements.',
    'Good maps are built in rooms with the whole team — never by one person at a desk.'
  ],
  antiPatterns:[
    'Vertical slicing: going deep on one activity before any others have stories.',
    'Overstuffed MVP: putting everything into R1 because the team can\'t say no.',
    'Missing skeleton: having stories but no thin end-to-end release defined.',
    'Empty backbone: activities with no tasks — the journey has holes.',
    'Leaf-bag backlog: flat list of stories with no backbone context.',
    'Wrong room: building the map without the people who do the actual work.',
    'Outputs not outcomes: stories describe screens/features, not user value.'
  ],
  mvpChecks:[
    'Does R1 span at least one story from EVERY activity?',
    'Can a real user complete the core job-to-be-done with only R1?',
    'Is R1 small enough to ship in one sprint or two?',
    'Have you removed everything from R1 that doesn\'t break the skeleton if removed?',
    'Does R1 create a working, testable experience — not just working code?'
  ],
  facilitation:[
    'Start every mapping session with "who is the user?" — write personas on sticky notes.',
    'Walk the narrative before adding tasks — tell the story out loud first.',
    'Use the "flat backlog problem" as an opener: show a list, ask who can see the user in it.',
    'Ask "what happens just before?" and "what happens just after?" to find missing activities.',
    'Red-dot voting for MVP: each person gets 3 dots, place on the stories they can\'t live without.',
    'Time-box activity discussions to 5 minutes each — you can always come back.',
    'End every session with: "What did we learn that we didn\'t know before?"'
  ]
};

// ── BULK ADD ──────────────────────────────────────────────
function toggleBulk(taskId){
  const area = document.getElementById('bulk-' + taskId);
  if(!area) return;
  area.classList.toggle('open');
  if(area.classList.contains('open')) document.getElementById('bulk-ta-' + taskId).focus();
}

function bulkAddStories(taskId){
  const ta = document.getElementById('bulk-ta-' + taskId);
  if(!ta) return;
  const lines = ta.value.split('\n').map(l=>l.trim()).filter(Boolean);
  if(!lines.length){ toggleBulk(taskId); return; }
  const task = STATE.activities.flatMap(a=>a.tasks).find(t=>t.id===taskId);
  if(!task) return;
  lines.forEach(line=>{
    task.stories.push({id:'s'+Date.now()+Math.random().toString(36).slice(2,6), text:line, release:'1'});
  });
  saveState(); renderBoard(); renderAnalysis();
  addChatMsg('agent', `✅ Added <strong>${lines.length} stories</strong> to "<em>${esc(task.title)}</em>"!`);
  switchTab('chat');
}

// ── AI REVIEW ─────────────────────────────────────────────
function aiReview(){
  const token = localStorage.getItem('copilot_token');
  if(!token){ document.getElementById('token-modal').classList.add('open'); return; }
  runAIReview(token);
}

function saveToken(){
  const t = document.getElementById('token-input').value.trim();
  if(!t) return;
  localStorage.setItem('copilot_token', t);
  document.getElementById('token-modal').classList.remove('open');
  runAIReview(t);
}

async function runAIReview(token){
  addChatMsg('agent', '🤖 Running AI Review — this uses GitHub Copilot API…');
  switchTab('chat');
  const mapState = {
    activities: STATE.activities.map(a=>({title:a.title, tasks:a.tasks.map(t=>({title:t.title, stories:t.stories.map(s=>({text:s.text,release:s.release||'1'}))}))})
    ),
    context: STATE.context
  };
  const systemPrompt = `You are a User Story Mapping expert following Jeff Patton's methodology. Analyse the story map and return ONLY valid JSON (no markdown, no text outside JSON).

Jeff Patton principles to check:
- Walking skeleton: thin slice across ALL activities in R1
- Horizontal slicing: R1 should have ~1 story per task, not deep on one activity
- Backbone: every activity must have tasks
- MVP = complete working experience, not a feature set

Return JSON: {"suggestions":[{"type":"missing-story"|"missing-task"|"wrong-release"|"split-story","targetActivity":"string","targetTask":"string","suggestion":"string","rationale":"string"}]}
Limit to 8 suggestions. Be specific and actionable.`;
  try {
    const resp = await fetch('https://api.githubcopilot.com/chat/completions', {
      method:'POST',
      headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
      body:JSON.stringify({model:'gpt-4o',messages:[{role:'system',content:systemPrompt},{role:'user',content:'Story map:\n'+JSON.stringify(mapState,null,2)}]})
    });
    if(!resp.ok){ addChatMsg('agent','❌ API error: '+resp.status+'. Check your token.'); return; }
    const data = await resp.json();
    const raw = data.choices[0].message.content.trim().replace(/^```json\s*/,'').replace(/```$/,'');
    const parsed = JSON.parse(raw);
    STATE.aiSuggestions = (STATE.aiSuggestions||[]).concat(parsed.suggestions||[]);
    saveState();
    addChatMsg('agent', `✅ AI Review complete — <strong>${parsed.suggestions.length} suggestions</strong> added. Switch to <strong>Analysis</strong> tab to review.`);
    renderAnalysis();
  } catch(e){
    addChatMsg('agent','❌ AI Review failed: '+e.message);
  }
}

function acceptAISug(idx){
  const s = (STATE.aiSuggestions||[])[idx];
  if(!s) return;
  const task = STATE.activities.flatMap(a=>a.tasks).find(t=>t.title===s.targetTask);
  if(task){
    task.stories.push({id:'s'+Date.now(), text:s.suggestion, release:'1'});
    addChatMsg('agent', `✅ Added story to "${esc(s.targetTask)}"`);
  } else {
    const act = STATE.activities.find(a=>a.title===s.targetActivity);
    if(act) act.tasks.push({id:'t'+Date.now(), title:s.suggestion, stories:[]});
    addChatMsg('agent', `✅ Added task "${esc(s.suggestion)}" to activity "${esc(s.targetActivity||'')}"`);
  }
  s.dismissed = true;
  saveState(); renderBoard(); renderAnalysis();
}

function dismissAISug(idx){
  const s = (STATE.aiSuggestions||[])[idx];
  if(s){ s.dismissed = true; saveState(); renderAnalysis(); }
}

// ── ACTIVITY CLUSTERING ────────────────────────────────────
function tokenize(str){ return str.toLowerCase().split(/\W+/).filter(w=>w.length>2); }

function jaccard(a, b){
  const sa=new Set(a), sb=new Set(b);
  let inter=0; sa.forEach(x=>{ if(sb.has(x)) inter++; });
  return inter / (sa.size + sb.size - inter);
}

function clusterActivities(){
  if(STATE.activities.length<2){ addChatMsg('agent','Need at least 2 activities to cluster.'); switchTab('chat'); return; }
  const tkns = STATE.activities.map(a=>tokenize(a.title + ' ' + a.tasks.map(t=>t.title).join(' ')));
  const n = STATE.activities.length;
  const THRESH = 0.12;
  const labels = new Array(n).fill(-1);
  let clusterCount = 0;
  for(let i=0;i<n;i++){
    if(labels[i]>=0) continue;
    labels[i]=clusterCount;
    for(let j=i+1;j<n;j++){
      if(labels[j]<0 && jaccard(tkns[i],tkns[j])>=THRESH) labels[j]=clusterCount;
    }
    clusterCount++;
  }
  STATE.clusters = {};
  STATE.activities.forEach((a,i)=>{ STATE.clusters[a.id]=labels[i]; });
  saveState(); renderBoard(); renderAnalysis();
  const grouped = {};
  STATE.activities.forEach((a,i)=>{ (grouped[labels[i]]=grouped[labels[i]]||[]).push(a.title); });
  const summary = Object.values(grouped).map((names,i)=>`<li><span class="cluster-badge cl${i%5}">C${i+1}</span> ${names.join(' · ')}</li>`).join('');
  addChatMsg('agent', `🔗 Clustering done!<ul>${summary}</ul>Activities with the same badge share vocabulary — potential to merge or reorder.`);
  switchTab('chat');
}

// ── IMPORT FROM PRODUCT DISCOVERY ─────────────────────────
function importFromDiscovery(){
  const raw = localStorage.getItem('pdv2_storymap_export') || localStorage.getItem('pdv2_export');
  if(!raw){ addChatMsg('agent','❌ No Product Discovery export found. Go to Product Discovery v2 and click "🗺️ Send to Story Map".'); switchTab('chat'); return; }
  try {
    const pd = JSON.parse(raw);
    const ctx = pd.context || {};
    const parts = [];
    if(ctx.summary) parts.push('Context: ' + ctx.summary);
    if(pd.problems && pd.problems.length) parts.push('Problems: ' + pd.problems.slice(0,3).map(p=>typeof p==='string'?p:p.statement||p.title||JSON.stringify(p)).join('; '));
    if(pd.outcomes && pd.outcomes.length) parts.push('Outcomes: ' + pd.outcomes.slice(0,3).map(o=>typeof o==='string'?o:o.title||JSON.stringify(o)).join('; '));
    if(parts.length) STATE.context = parts.join('\n');
    document.getElementById('ctx-text').value = STATE.context;
    saveState(); renderAnalysis();
    addChatMsg('agent', '✅ Context imported from Product Discovery! The Analysis panel will now include product context in suggestions.');
    switchTab('chat');
  } catch(e){ addChatMsg('agent','❌ Failed to parse export: '+e.message); }
}
